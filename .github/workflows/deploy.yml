name: Deploy to PlanetHoster (famagusta.ashrafchihab.com)

on:
  push:
    branches:
      - main # Change to "master" si besoin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build Vite
      - name: Build
        run: npm run build
        env:
          # Ajoute ici tes variables Firebase si elles ne sont pas hardcodées
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # 5. Deploy via lftp vers PlanetHoster
      - name: Deploy via lftp
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" \
            sftp://node182-eu.n0c.com:5022 <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 3
          mirror --reverse --delete --verbose ./dist/ /famagusta/
          bye
          EOF
